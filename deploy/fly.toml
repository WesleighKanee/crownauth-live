# Fly.io — fixed live host (no PC required)
# Deploy from owner_panel/:
#   fly launch --copy-config --name whitecrown-auth --region sin --yes
#   fly volumes create crowndata --size 1 --region sin
#   fly secrets set PUBLIC_HOST=whitecrown-auth.fly.dev
#   fly deploy

app = "whitecrown-auth-75576"
primary_region = "sin"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PORT = "8787"
  CROWNAUTH_DATA = "/data"
  # Set PUBLIC_HOST via: fly secrets set PUBLIC_HOST=your-app.fly.dev

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "crowndata"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

